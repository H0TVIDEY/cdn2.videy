<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NONTON</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #141414;
            color: #ffffff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        /* Bagian Pemutar Video Utama */
        .main-video-wrapper {
            background-color: #1f1f1f;
            border-radius: 8px;
            overflow: hidden;
            padding-bottom: 15px;
        }

        video {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #000;
        }

        .video-info {
            padding: 15px;
        }

        .video-info h2 {
            font-size: 1.4rem;
            margin-bottom: 8px;
        }

        .video-info p {
            color: #aaa;
            font-size: 0.9rem;
        }

        /* Bagian Daftar Video Selanjutnya */
        .playlist-wrapper {
            background-color: #1f1f1f;
            border-radius: 8px;
            padding: 15px;
            max-height: 600px;
            overflow-y: auto;
        }

        .playlist-wrapper h3 {
            margin-bottom: 15px;
            font-size: 1.2rem;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .playlist-item {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .playlist-item:hover {
            background-color: #333;
        }

        .thumbnail {
            width: 120px;
            aspect-ratio: 16/9;
            background-color: #444;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #ccc;
        }

        .item-info h4 {
            font-size: 0.95rem;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .item-info p {
            font-size: 0.8rem;
            color: #aaa;
        }

        /* Responsif untuk HP */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-video-wrapper">
            <video id="main-player" controls autoplay poster="https://via.placeholder.com/800x450/222/fff?text=Pilih+Video">
                <source id="video-source" src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                Browser kamu tidak mendukung pemutar video ini.
            </video>
            <div class="video-info">
                <h2 id="video-title">Big Buck Bunny (Video Utama)</h2>
                <p id="video-desc">Deskripsi singkat mengenai video yang sedang diputar saat ini.</p>
            </div>
        </div>

        <div class="playlist-wrapper">
            <h3>Video Selanjutnya</h3>
            
            <div class="playlist-item" onclick="changeVideo('https://www.w3schools.com/html/mov_bbb.mp4', 'Big Buck Bunny (Video Utama)', 'Deskripsi mengenai kelinci besar yang lucu.')">
                <div class="thumbnail">Video 1</div>
                <div class="item-info">
                    <h4>Big Buck Bunny</h4>
                    <p>W3Schools Animation</p>
                </div>
            </div>

            <div class="playlist-item" onclick="changeVideo('https://www.w3schools.com/html/movie.mp4', '熊 (Beruang) di Padang Rumput', 'Video pendek dokumenter tentang beruang di alam liar.')">
                <div class="thumbnail">Video 2</div>
                <div class="item-info">
                    <h4>Bear in the Wild</h4>
                    <p>Nature Documentary</p>
                </div>
            </div>

            <div class="playlist-item" onclick="changeVideo('https://assets.mixkit.co/videos/preview/mixkit-stars-in-space-background-1611-large.mp4', 'Keindahan Bintang di Luar Angkasa', 'Pemandangan cinematic bintang-bintang di galaksi jauh.')">
                <div class="thumbnail">Video 3</div>
                <div class="item-info">
                    <h4>Stars in Space</h4>
                    <p>Cinematic Video</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function changeVideo(videoSrc, title, description) {
            const player = document.getElementById('main-player');
            const source = document.getElementById('video-source');
            const videoTitle = document.getElementById('video-title');
            const videoDesc = document.getElementById('video-desc');

            // Ganti sumber video dan teks info
            source.src = videoSrc;
            videoTitle.innerText = title;
            videoDesc.innerText = description;

            // Muat ulang video dan putar otomatis
            player.load();
            player.play();
        }
    </script>

</body>
</html>
